name: Bug Report
description: Report a bug or unexpected behavior in nectar-ui
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - tknatwork

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out all fields as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Import `Button` from `nectar-ui`
        2. Render with `variant="primary"`
        3. Click the button
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include screenshots or error messages if applicable.
      placeholder: Describe the actual behavior...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: nectar-ui Version
      description: Which version of nectar-ui are you using?
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you seeing this problem in?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you using?
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, code snippets, or reproduction links (e.g. CodeSandbox) here.
      placeholder: Any additional information...
