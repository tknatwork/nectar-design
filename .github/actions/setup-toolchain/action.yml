# === SYSTEM PAIRING ===
# Consumed by: every CI workflow in this repo (ci.yml, chromatic.yml)
# Updated by: manual — mirror of myportfolio's setup-toolchain
# Pairs with: myportfolio's .github/actions/setup-toolchain/action.yml,
#             myportfolio's docs/decisions/server-ops/AD-014-pnpm-store-warm-cron.md,
#             myportfolio's docs/decisions/server-ops/AD-016-pnpm-store-ownership.md
# Update trigger: toolchain version bump OR new pnpm-store fix OR mp ships a setup-toolchain change
# Last verified: 2026-05-11
# === END PAIRING ===

name: Setup toolchain (nectar-design)
description: |
  Activates pnpm via corepack into a user-writable directory and sets up
  Node, with a runner.environment-aware cache strategy for the pnpm-store.

  Why this composite exists:
  - nectar-design used to use `pnpm/action-setup@v5`, which writes to
    /home/runner/setup-pnpm/. On self-hosted runners that path persists
    across jobs and accumulated stale ownership before the warm-cron
    `umask 002` change. The action's self-installer then trips on
    `EPERM: operation not permitted, chmod` because it can't fix the
    permissions of files inside a directory it didn't own.
  - corepack writes into $HOME/.local/bin (per-job, user-writable) and
    sidesteps that path entirely.

  Cache strategy (mirror of myportfolio's setup-toolchain):
  - GitHub-hosted: setup-node@v6 restores pnpm-store from Azure Blob via
    `cache: pnpm`. mkdir pre-create avoids tar exit-2 on the cross
    runner-type cache key.
  - Self-hosted (nest-nd-1): host already has a warm
    /var/cache/pnpm-store populated by the daily cron, and
    /home/runner/.config/pnpm/rc points pnpm at it. Skipping
    setup-node's Azure Blob restore avoids ~10-15 min of wasted
    bandwidth and closes the SAS-window expiry flake.

  See myportfolio's docs/system/runner-specs.md "Cache topology" for the
  authoritative layout of host-local vs Azure Blob caches.

  Server-side decisions cross-referenced (server-ops references.md):
  - AD-014: pnpm-store warm-cron umask 002 + setgid (closed the
    `/home/runner/setup-pnpm/` EPERM that motivated the original
    pnpm/action-setup → corepack migration in nd PR #83).
  - AD-016: chown -R runner:runner /var/cache/pnpm-store/ (closed the
    hardlink chmod EPERM that motivated the temporary
    `npm_config_package_import_method=copy` workaround. Reverted in
    this composite — hardlinks are now viable again, install gets back
    to its faster + smaller-disk footprint).

  Corepack-ordering fix (2026-05-11, mirror of mp PR #694 / cross-Claude
  #691): Node is installed BEFORE corepack runs (Step 0 below). This
  prevents `corepack prepare pnpm@<v>` from executing on the image-default
  Node 20.20.2 that ships in github-hosted ubuntu-24.04 runners — which
  would otherwise crash with `ERR_UNKNOWN_BUILTIN_MODULE: node:sqlite`
  the moment a pnpm 11+ install is attempted (pnpm 11 imports
  `node:sqlite`, added to Node only in v22.5). Original failure traced
  on mp Renovate PR #682; server-ops course-corrected the diagnosis
  (it's a workflow-side bug, not a runner-host issue) on cross-Claude
  #691. nd is vulnerable to the SAME failure mode on its next pnpm
  major attempt — this composite mirrors the fix proactively.

inputs:
  node-version:
    description: Node.js version to install. Must match engines.node in package.json (>=24.15.0).
    required: false
    default: 24.15.0
  pnpm-version:
    description: pnpm version to activate via corepack. Must match the packageManager field in package.json.
    required: false
    default: 10.33.4
  cache-dependency-path:
    description: pnpm-lock.yaml path used as the setup-node cache key (GitHub-hosted only).
    required: false
    default: pnpm-lock.yaml

runs:
  using: composite
  steps:
    # === STEP 0 — Install Node BEFORE corepack runs ===
    # The image-default Node on github-hosted ubuntu-24.04 is 20.20.2.
    # Without this step, the next step (`corepack prepare pnpm@<v>`)
    # would execute on that image-default Node. When `<v>` is pnpm 11+
    # (which imports `node:sqlite` — added to Node only in v22.5+),
    # corepack-fetched pnpm crashes with `ERR_UNKNOWN_BUILTIN_MODULE:
    # No such built-in module: node:sqlite` before it can even print
    # --version. Observed on mp Renovate PR #682 (closed) and traced
    # via cross-Claude #691: server-ops pulled the failing run's logs
    # and confirmed it executed on a github-hosted runner (image-default
    # Node 20), NOT on nest-mp-*/nest-nd-1 (which apt-installed Node
    # 24.15.0). The fix is workflow-side: install Node FIRST so corepack
    # runs on the pinned 24.x.
    #
    # On self-hosted runner (nest-nd-1) the host already has Node 24.x
    # at the system level via apt NodeSource, so setup-node@v6 finds it
    # in toolcache and is a near-no-op (~200ms). This step supersedes
    # the previous "Setup Node (self-hosted, no Azure Blob cache)" step,
    # whose rationale referenced AD-016 (revert of nd PR #83's chmod
    # workaround). That historical context is preserved in the
    # description block above; the AD-016 ownership rationale is
    # unchanged.
    #
    # No `cache:` parameter here — pnpm isn't on PATH yet. The dedicated
    # cache restore step (Step 3 below) handles pnpm-store on
    # github-hosted; self-hosted uses host-warm /var/cache/pnpm-store
    # per AD-014.
    - name: Setup Node (always — corepack target)
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    # === STEP 1 — Install pnpm via corepack ===
    # Composite-action inputs are routed through env: per CWE-78
    # mitigation (don't interpolate inputs/contexts directly into a run:
    # body; use process env so the value can't escape its quoting context).
    #
    # Step 0 guarantees this runs on the pinned Node version (24.x), so
    # any pnpm major version (10, 11, 12, ...) is safe to corepack-fetch.
    # The `command -v pnpm` short-circuit lets a pre-installed pnpm win
    # over corepack — relevant when this action runs inside a container
    # image that already ships pnpm.
    - name: Setup pnpm via corepack
      shell: bash
      env:
        PNPM_VERSION: ${{ inputs.pnpm-version }}
      run: |
        if ! command -v pnpm >/dev/null 2>&1; then
          echo "pnpm not on PATH; activating via corepack into user-writable dir"
          # Redirect corepack's cache to RUNNER_TEMP. Default $HOME/.cache
          # is not writable inside container jobs that run with
          # `--user 1001:1002` (e.g. Playwright/SAST containers) because
          # /github/home/.cache/ is root-owned by the base image.
          # RUNNER_TEMP is always writable on every runner topology
          # (GH-hosted, self-hosted, containerized). Mirror of
          # myportfolio's setup-toolchain fix on PR #861 — keeping both
          # repos' actions in lockstep so nd stays safe if it ever adds
          # a container job. Defense in depth.
          export COREPACK_HOME="${RUNNER_TEMP}/corepack"
          mkdir -p "$COREPACK_HOME"
          echo "COREPACK_HOME=$COREPACK_HOME" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
        fi
        pnpm --version
        which pnpm

    # === STEP 2 — Pre-create pnpm-store dir (GitHub-hosted only) ===
    # Pre-create the pnpm-store target directory on github-hosted before
    # setup-node@v6 attempts a `cache: pnpm` restore (Step 3 below).
    # Without this, the cache.tzst archive (which contains paths like
    # `~/.local/share/pnpm/store/v10/...`) fails to extract because
    # `~/.local/share/` doesn't exist on a fresh github-hosted runner.
    # tar logs `Cannot mkdir: No such file or directory` and exits 2,
    # actions/cache reports "Failed to restore", and the run continues
    # without the cache benefit. This mkdir eliminates the warning and
    # lets the restore succeed cleanly. (myportfolio PR #411 precedent.)
    - name: Pre-create pnpm-store dir (GitHub-hosted only)
      if: runner.environment == 'github-hosted'
      shell: bash
      run: |
        mkdir -p "$HOME/.local/share/pnpm/store"

    # === STEP 3 — Restore pnpm-store cache (GitHub-hosted only) ===
    # Second setup-node@v6 call: pnpm is now on PATH (Step 1) so the
    # `cache: pnpm` machinery can resolve `pnpm config get store-dir`.
    # The Node install short-circuits here — Node 24.x is already active
    # from Step 0, so setup-node logs "Found in cache" and proceeds to
    # the cache restore (~200ms overhead, documented fast path).
    #
    # Self-hosted (nest-nd-1) skips this step entirely: host-local
    # /var/cache/pnpm-store is already warm via daily cron (AD-014) and
    # /home/runner/.config/pnpm/rc points pnpm there, so an Azure Blob
    # restore would just waste bandwidth (~10-15 min observed on mp PR
    # #404 first run) and reopens the SAS-window expiry flake.
    #
    # Hardlinks from /var/cache/pnpm-store work because the store is
    # now owned by runner:runner (server-ops AD-016). Earlier versions
    # of this composite needed `npm_config_package_import_method=copy`
    # as a workaround; that's been reverted now that the underlying
    # ownership mismatch is fixed at the source.
    - name: Restore pnpm-store cache (GitHub-hosted)
      if: runner.environment == 'github-hosted'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
