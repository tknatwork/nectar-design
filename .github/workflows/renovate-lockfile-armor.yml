# === SYSTEM PAIRING ===
# Consumed by: GitHub Actions runtime on PR-opened/synchronize events
# Updated by: manual
# Pairs with: renovate.json, myportfolio's .github/workflows/renovate-lockfile-armor.yml (sibling)
# Update trigger: Renovate config shift OR lockfile auto-fix policy change
# Last verified: 2026-05-19
# === END PAIRING ===
#
# Mirror of myportfolio's renovate-lockfile-armor.yml for pipeline
# parity per ADR 0021 follow-up. Stale lockfiles break nd's CI build,
# and Renovate occasionally ships package.json bumps without lockfile
# regen. Same defensive auto-regen pattern.

name: Renovate Lockfile Armor
on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize]
permissions:
  contents: write
jobs:
  guard:
    if: github.actor == 'app/renovate' || startsWith(github.head_ref, 'renovate/')
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ github.token }}
          ref: ${{ github.head_ref }}
          submodules: recursive
      - uses: ./.github/actions/setup-toolchain
      - name: Probe frozen-lockfile state
        id: probe
        run: |
          if pnpm install --frozen-lockfile --ignore-scripts > /tmp/probe.log 2>&1; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "OK: lockfile fresh"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            cat /tmp/probe.log | tail -10
          fi
      - name: Regenerate + push if stale
        if: steps.probe.outputs.stale == 'true'
        env:
          # Route head_ref through env (not direct ${{ }} interpolation
          # in run:) per CWE-78 / Semgrep p/github-actions. head_ref is
          # attacker-controllable on cross-fork PRs; quoted-env-var
          # access blocks injection.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "fix: regenerate pnpm-lock.yaml for Renovate PR [skip ci]"
            git push origin "HEAD:$HEAD_REF"
          fi
