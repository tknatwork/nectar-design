name: Chromatic — Visual Regression

# Trigger model — three-tier throttle (revised 2026-05-09 per
# tknatwork/myportfolio's ADR 0017). Mirrors mp's chromatic-unified.yml
# trigger model so both repos' Chromatic runs fire on the same cadence
# under the shared paired-token model.
#
# Three tiers:
#   Tier 1: ship-PRs (dev → main) — canonical baseline before production
#   Tier 2: weekly cron Mon 06:00 UTC against main HEAD — drift catch
#   Tier 3: PRs labeled `visual-check` — opt-in mid-flight feature review
#   Plus:   workflow_dispatch — universal escape hatch
#
# Combined with the existing `if: false &&` pause on the chromatic
# job below: the workflow stays fully paused (free-tier quota
# exhausted 2026-05-08 on the shared Chromatic project). When the
# quota resets, drop the `false &&` to un-pause; the throttle alone
# then takes effect, preventing another quota burn.
#
# Visual coverage during the pause is handled mp-side:
#   - Lost Pixel for Storybook (mp's lost-pixel-storybook.yml)
#   - Percy for app routes (mp's percy.yml)
#
# Security: no untrusted input (issue/PR-body) referenced; only
# auto-generated github context vars + secrets. No command-injection
# vector via run: blocks. Token from secrets via env: mapping.
"on":
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - dev
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: null
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  determine-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Three-tier throttle — mirrors the chromatic job's if: below.
    # Both must short-circuit on irrelevant events so determine-runner
    # doesn't waste a slot when chromatic itself would skip.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'dev') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'visual-check'))
    permissions:
      actions: read
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |-
          #!/bin/bash
          set -e
          AVAILABLE=$(gh api "repos/${{ github.repository }}/actions/runners" --jq '[.runners[] | select(.status=="online" and .busy==false and (.labels | map(.name) | contains(["self-hosted", "Linux"])))] | length' 2>/dev/null || echo 0)
          if [ "$AVAILABLE" -gt 0 ]; then
            echo 'runner=["self-hosted","Linux","X64"]' >> $GITHUB_OUTPUT
            echo "Selected: self-hosted (${AVAILABLE} runner(s) available)"
          else
            echo 'runner="ubuntu-latest"' >> $GITHUB_OUTPUT
            echo "Selected: ubuntu-latest (no self-hosted available)"
          fi
  chromatic:
    name: Visual Diff
    needs: determine-runner
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    timeout-minutes: 20
    # PAUSED 2026-05-08 — shared Chromatic free-tier snapshot quota
    # exhausted (paired-token model with mp's chromatic-unified.yml).
    # While paused, visual coverage is mp-side only:
    #   - Lost Pixel (Storybook component coverage, self-hosted)
    #   - Percy (app route page-level coverage, ~5k/month free tier)
    # See tknatwork/myportfolio's docs/decisions/0017-...md for the
    # tiered tool model.
    #
    # Re-enable when monthly quota resets:
    #   1. Drop `false &&` from the if: combinator below. The three-
    #      tier throttle in the (...) clause then takes effect alone,
    #      preventing another quota burn.
    #   2. Verify in Chromatic dashboard that quota has reset.
    #
    # `false && (...)` short-circuits to false → workflow stays
    # paused. The (...) clause documents the three-tier throttle
    # that will activate post-un-pause.
    if: |
      false && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'dev') ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'visual-check'))
      )
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      # Centralizes pnpm + Node setup. Replaces pnpm/action-setup@v5
      # (stale-permission EPERM on /home/runner/setup-pnpm/ across
      # self-hosted job runs) with corepack writing to $HOME/.local/bin.
      # Splits cache strategy by runner.environment: self-hosted skips
      # Azure Blob (host /var/cache/pnpm-store warm via cron);
      # github-hosted pre-creates the cache target before setup-node@v6.
      - name: Setup toolchain (pnpm + Node)
        uses: ./.github/actions/setup-toolchain
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build design system
        run: pnpm build
      - name: Run Chromatic
        uses: chromaui/action@1bbb5819252d9782cb7d77122d9becae467def18 # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Visual changes don't fail CI — they need accept/reject in the
          # Chromatic dashboard. CI's job is just to upload + report.
          exitZeroOnChanges: true
          exitOnceUploaded: true
          # Auto-accept baselines on dev push only. Dev is the staging
          # branch — visual changes on dev have either been reviewed in
          # the originating PR (via Chromatic's UI Review step) or are
          # build-environment artifacts (corepack vs nvm rendering, font
          # subset variations, etc.) that aren't worth a manual approval
          # gate. PRs to dev still go through normal review.
          autoAcceptChanges: dev
