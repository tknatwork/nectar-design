name: Chromatic — Visual Regression

# Runs visual regression checks via Chromatic on PRs to main/dev and pushes
# to main/dev. Visual changes are NOT a hard CI gate (exitZeroOnChanges:
# true) — the Chromatic dashboard is where you accept/reject diffs. The
# GHA job's job is just to upload the build and report results back to
# GitHub.
#
# Skipped via paths filter on doc-only / non-source changes — anything
# that can't change a story's rendered output. Cuts CI noise for README/
# CLAUDE.md edits and similar.
"on":
  pull_request:
    branches:
      - main
      - dev
    paths:
      # Anything that could change a story's rendered output.
      - 'src/**'
      - 'tokens/**'
      - 'css/**'
      - '.storybook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsup.config.ts'
      # And the workflow itself, so config changes are validated.
      - '.github/workflows/chromatic.yml'
      - '.github/actions/setup-toolchain/**'
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/**'
      - 'tokens/**'
      - 'css/**'
      - '.storybook/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsup.config.ts'
      - '.github/workflows/chromatic.yml'
      - '.github/actions/setup-toolchain/**'
  workflow_dispatch: null
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  determine-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |-
          #!/bin/bash
          set -e
          AVAILABLE=$(gh api "repos/${{ github.repository }}/actions/runners" --jq '[.runners[] | select(.status=="online" and .busy==false and (.labels | map(.name) | contains(["self-hosted", "Linux"])))] | length' 2>/dev/null || echo 0)
          if [ "$AVAILABLE" -gt 0 ]; then
            echo 'runner=["self-hosted","Linux","X64"]' >> $GITHUB_OUTPUT
            echo "Selected: self-hosted (${AVAILABLE} runner(s) available)"
          else
            echo 'runner="ubuntu-latest"' >> $GITHUB_OUTPUT
            echo "Selected: ubuntu-latest (no self-hosted available)"
          fi
  chromatic:
    name: Visual Diff
    needs: determine-runner
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Centralizes pnpm + Node setup. Replaces pnpm/action-setup@v5
      # (stale-permission EPERM on /home/runner/setup-pnpm/ across
      # self-hosted job runs) with corepack writing to $HOME/.local/bin.
      # Splits cache strategy by runner.environment: self-hosted skips
      # Azure Blob (host /var/cache/pnpm-store warm via cron);
      # github-hosted pre-creates the cache target before setup-node@v6.
      - name: Setup toolchain (pnpm + Node)
        uses: ./.github/actions/setup-toolchain
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build design system
        run: pnpm build
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Visual changes don't fail CI — they need accept/reject in the
          # Chromatic dashboard. CI's job is just to upload + report.
          exitZeroOnChanges: true
          exitOnceUploaded: true
          # Auto-accept baselines on dev push only. Dev is the staging
          # branch — visual changes on dev have either been reviewed in
          # the originating PR (via Chromatic's UI Review step) or are
          # build-environment artifacts (corepack vs nvm rendering, font
          # subset variations, etc.) that aren't worth a manual approval
          # gate. PRs to dev still go through normal review.
          autoAcceptChanges: dev
