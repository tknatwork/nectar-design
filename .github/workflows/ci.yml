name: CI — nectar-design
"on":
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev
permissions:
  contents: read
jobs:
  determine-runner:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |-
          #!/bin/bash
          set -e
          AVAILABLE=$(gh api "repos/${{ github.repository }}/actions/runners" --jq '[.runners[] | select(.status=="online" and .busy==false and (.labels | map(.name) | contains(["self-hosted", "Linux"])))] | length' 2>/dev/null || echo 0)
          if [ "$AVAILABLE" -gt 0 ]; then
            echo 'runner=["self-hosted","Linux","X64"]' >> $GITHUB_OUTPUT
            echo "Selected: self-hosted (${AVAILABLE} runner(s) available)"
          else
            echo 'runner="ubuntu-latest"' >> $GITHUB_OUTPUT
            echo "Selected: ubuntu-latest (no self-hosted available)"
          fi
  build:
    name: Build + Type Check
    needs: determine-runner
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Type check
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Verify token generation
        run: |
          if [ ! -f "css/tokens.css" ]; then
            echo "::error::css/tokens.css not found after build"
            exit 1
          fi
          LINE_COUNT=$(wc -l < css/tokens.css)
          if [ "$LINE_COUNT" -lt 100 ]; then
            echo "::error::Token file too short ($LINE_COUNT lines). Expected 100+. Pipeline may be broken."
            exit 1
          fi
          echo "Token CSS: $LINE_COUNT lines — pipeline intact."
      - name: Verify dist output
        run: |
          REQUIRED=(
            "dist/index.js"
            "dist/index.d.ts"
            "dist/tokens.css"
            "dist/theme.css"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "::error::Build output incomplete"
            exit 1
          fi
          echo "All required dist files present."
      - name: Check bundle size limits
        run: pnpm exec size-limit
      - name: Unit tests
        run: pnpm test
