# === SYSTEM PAIRING ===
# Consumed by: GitHub Actions runtime on PR-to-dev events
# Updated by: manual
# Pairs with: .github/workflows/ci.yml, myportfolio's .github/workflows/pr-readiness.yml (sibling)
# Update trigger: aggregator path-classifier rule change OR new dev-side workflow added
# Last verified: 2026-05-19
# === END PAIRING ===

name: PR Readiness
on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: read  # required for gh api .../check-runs polling

concurrency:
  group: pr-readiness-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  aggregate:
    name: PR Readiness
    # ubuntu-latest (NOT self-hosted nest-nd-1) — aggregator only does
    # `gh api` polling, no heavy build work. nd's runner pool has 1 agent;
    # running aggregator on it serialized with ci.yml + semgrep.yml,
    # causing aggregator to deadlock waiting for jobs that couldn't start
    # (observed timeout on PR #158 second run). Moving to github-hosted
    # frees nd-1 for the actual workload. Cost: ~30s of github-hosted
    # minutes per PR (within free tier for the repo's PR cadence).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA..$HEAD_SHA")
          code_changed=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/**|*.md|CODEOWNERS|AGENTS.md|CONTEXT.md|DESIGN.md|SKILLS.md|REFERENCES.md|SECURITY.md)
                ;;
              renovate.json|.github/dependabot.yml|config/**)
                ;;
              .github/workflows/**)
                code_changed=true ;;
              *)
                code_changed=true ;;
            esac
          done <<< "$changed"
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          echo "Path classifier: code_changed=$code_changed"

      - name: Wait for dev-side workflows (code paths changed)
        if: steps.paths.outputs.code_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # check-runs API surfaces JOB names, not WORKFLOW names. nd ci.yml
          # workflow name = "CI — nectar-design" but its job is "Build + Type Check".
          required=("Build + Type Check" "Semgrep SAST")
          deadline=$(( $(date +%s) + 1200 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            all_pass=true
            missing=""
            for w in "${required[@]}"; do
              status=$(gh api "repos/$GITHUB_REPOSITORY/commits/$PR_HEAD/check-runs" \
                --jq ".check_runs[] | select(.name == \"$w\") | .conclusion" \
                | head -1)
              if [ "$status" != "success" ]; then
                all_pass=false
                missing="$missing $w[$status]"
              fi
            done
            if [ "$all_pass" = "true" ]; then
              echo "All required workflows passed."
              exit 0
            fi
            echo "Waiting for:$missing"
            sleep 30
          done
          echo "::error::Required workflows did not all pass within 20 minutes"
          exit 1

      - name: Instant PASS (no code paths changed)
        if: steps.paths.outputs.code_changed == 'false'
        run: echo "No code paths changed; aggregator PASS."
